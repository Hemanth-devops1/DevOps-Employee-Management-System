<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            Employee Management System
        </a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow p-4">

        <h3 class="mb-4">
            Add New Employee
        </h3>

        <form id="employeeForm">

            <div class="mb-3">
                <label class="form-label">Name</label>

                <input
                        type="text"
                        id="name"
                        class="form-control"
                        required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Email

                </label>

                <input
                        type="email"
                        id="email"
                        class="form-control"
                        required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Department

                </label>

                <input
                        type="text"
                        id="department"
                        class="form-control"
                        required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Salary

                </label>

                <input
                        type="number"
                        id="salary"
                        class="form-control"
                        required>

            </div>

            <button
                    type="submit"
                    class="btn btn-success"
                    id="saveBtn">

                Save Employee

            </button>
            <button
    type="button"
    class="btn btn-secondary ms-2"
    id="cancelBtn"
    onclick="cancelEdit()"
    style="display:none;">

    Cancel

</button>

        </form>

    </div>

    <hr class="my-5">

    <h3 class="mb-3">

        Employee List

    </h3>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Email</th>

            <th>Department</th>

            <th>Salary</th>

            <th>Actions</th>

        </tr>

        </thead>

        <tbody id="employeeTable">

        </tbody>

    </table>

</div>

<script src="js/app.js"></script>

</body>
</html>
