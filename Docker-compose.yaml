version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: employee-postgres

    environment:
      POSTGRES_DB: employee_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - employee-network

  backend:

    build:
      context: ./employee-backend

    container_name: employee-backend

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/employee_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin

    networks:
      - employee-network

  frontend:

    build:
      context: ./employee-frontend

    container_name: employee-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    networks:
      - employee-network

volumes:

  postgres-data:

networks:

  employee-network: